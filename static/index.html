<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sakura - Premium AI Assistant</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
  <div class="app-container">
    <!-- Sidebar backdrop for mobile view -->
    <div class="sidebar-backdrop" id="sidebarBackdrop"></div>

    <!-- Sidebar Container -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="brand">
          <div class="brand-icon">A</div>
          <span>Sakura</span>
        </div>
        <button class="collapse-sidebar-btn" id="collapseSidebarBtn" aria-label="Collapse Sidebar">
          <i class="fa-solid fa-chevron-left"></i>
        </button>
      </div>
      
      <button class="new-chat-btn" id="newChatBtn">
        <i class="fa-solid fa-plus"></i> <span>New Chat</span>
      </button>
      
      <div class="chat-history-container">
        <ul class="chat-history-list" id="chatHistoryList">
          <!-- Chat list items injected dynamically -->
        </ul>
      </div>
    </aside>

    <!-- Main Chat Window -->
    <main class="chat-window">
      <!-- Header -->
      <header class="chat-header">
        <div class="header-left">
          <button class="menu-toggle" id="menuToggle" aria-label="Toggle Sidebar">
            <i class="fa-solid fa-bars-staggered"></i>
          </button>
        </div>

        <div class="header-right">
          <div class="settings-container">
            <button class="settings-btn" id="settingsBtn" aria-label="Open Settings">
              <i class="fa-solid fa-gear"></i>
            </button>
            <div class="settings-dropdown" id="settingsDropdown">
              <div class="settings-header">
                <span>Settings</span>
              </div>
              <div class="user-profile-card">
                <div class="profile-avatar">A</div>
                <div class="profile-info">
                  <span class="profile-name">Aditya</span>
                  <span class="profile-email">aditya@sakura.ai</span>
                </div>
              </div>
              <div class="settings-option">
                <div class="option-label">
                  <i class="fa-regular fa-moon" id="themeIcon"></i>
                  <span>Dark Mode</span>
                </div>
                <label class="theme-switch">
                  <input type="checkbox" id="themeToggleCheckbox">
                  <span class="switch-slider"></span>
                </label>
              </div>
            </div>
          </div>
        </div>
      </header>

      <!-- Messages Stream -->
      <div class="messages-container" id="messagesStream">
        <!-- Messages/Greetings injected dynamically -->
      </div>

      <!-- Input Section -->
      <div class="input-container">
        <div class="input-box-wrapper">
          <div class="input-row">
            <textarea class="chat-input" id="chatInput" rows="1" placeholder="Type a message..." required></textarea>
            <button class="send-btn" id="sendBtn" aria-label="Send Message">
              <svg viewBox="0 0 24 24">
                <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path>
              </svg>
            </button>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
