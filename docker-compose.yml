services:
  app:
    build: .
    ports:
      - "80:80"
    depends_on:
      db:
        condition: service_healthy
      sakura:
        condition: service_started
      ollama-init:
        condition: service_completed_successfully
    environment:
      - DB_HOST=db
      - DB_USER=root
      - DB_PASSWORD=pass
      - DB_NAME=sakura
      - AI_URL=http://sakura:11434
      - AI_MODEL=qwen3:0.6b
      
  db:
    image: mysql:latest
    restart: always
    ports:
      - "3306:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=pass
      - MYSQL_DATABASE=sakura
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      timeout: 5s
      retries: 5

  sakura:
    image: appwrite/ollama:0.1.1
    restart: always
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

  ollama-init:
    image: curlimages/curl:8.11.0
    volumes:
      - ./exec:/exec
    entrypoint: ["sh", "/exec/ollama.sh"]
    depends_on:
      - sakura
    environment:
      - OLLAMA_HOST=http://sakura:11434
      - OLLAMA_MODEL=qwen3:0.6b

volumes:
  ollama_data: